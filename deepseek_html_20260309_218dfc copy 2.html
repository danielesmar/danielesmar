<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timeline de Proceso</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:40px;
color:#2c3e50;
}

.container{
max-width:900px;
margin:auto;
}

.title{
font-size:20px;
margin-bottom:20px;
font-weight:600;
}

.timeline-card{
background:white;
border-radius:12px;
padding:40px 30px;
margin-bottom:40px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
position:relative;
}

.timeline{
position:relative;
display:flex;
align-items:center;
justify-content:space-between;
}

.line{
position:absolute;
top:20px;
left:0;
width:100%;
height:6px;
background:#e5e9f2;
border-radius:10px;
}

.line-progress{
position:absolute;
top:20px;
left:0;
height:6px;
background:#2e7d32;
border-radius:10px;
transition:width .5s ease;
}

.point{
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:2;
}

.circle{
width:20px;
height:20px;
border-radius:50%;
background:#cfd8dc;
border:4px solid white;
box-shadow:0 0 0 3px #e5e9f2;
margin-bottom:10px;
}

.point.active .circle{
background:#2e7d32;
box-shadow:0 0 0 3px #2e7d32;
}

.label{
background:white;
padding:6px 14px;
border-radius:8px;
border:1px solid #e5e9f2;
font-size:14px;
}

.time{
margin-top:8px;
font-size:13px;
color:#7b8a9a;
}

.status{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
padding:10px 16px;
border-radius:8px;
font-size:14px;
font-weight:500;
color:white;
}

.status:after{
content:"";
position:absolute;
bottom:-8px;
left:50%;
transform:translateX(-50%);
border-left:8px solid transparent;
border-right:8px solid transparent;
border-top:8px solid;
}

.status.completed{
background:#1f2d3d;
}

.status.completed:after{
border-top-color:#1f2d3d;
}

.status.running{
background:#2e7d32;
}

.status.running:after{
border-top-color:#2e7d32;
}

@media(max-width:600px){

.timeline{
flex-direction:column;
align-items:flex-start;
}

.line,
.line-progress{
top:0;
left:9px;
width:6px;
height:100%;
}

.point{
flex-direction:row;
margin:25px 0;
}

.circle{
margin-right:15px;
margin-bottom:0;
}

.status{
position:relative;
top:auto;
left:auto;
transform:none;
margin-bottom:15px;
}

}

</style>
</head>


<body>

<div class="container">

<div class="title">Proceso completado</div>

<div class="timeline-card">

<div class="status completed">
Tiempo total: <b>24 minutos</b>
</div>

<div class="timeline">

<div class="line"></div>
<div class="line-progress" style="width:100%"></div>

<div class="point active">
<div class="circle"></div>
<div class="label">Inicio</div>
<div class="time">9/3/2026 13:41:08</div>
</div>

<div class="point active">
<div class="circle"></div>
<div class="label">Final</div>
<div class="time">9/3/2026 14:05:08</div>
</div>

</div>
</div>


<div class="title">Proceso en progreso</div>

<div class="timeline-card">

<div class="status running">
En progreso...
</div>

<div class="timeline">

<div class="line"></div>
<div class="line-progress" style="width:50%"></div>

<div class="point active">
<div class="circle"></div>
<div class="label">Inicio</div>
<div class="time">9/3/2026 13:41:08</div>
</div>

<div class="point">
<div class="circle"></div>
<div class="label">Final</div>
</div>

</div>
</div>

</div>

</body>
</html>
